{% extends "base.html" %}
{% block content %}

<h2>Heart Disease Dashboard</h2>

<h3>Heart Disease Prediction</h3>

<form action="/predict" method="post">

<label>Age</label><br>
<input type="number" name="age" required><br><br>

<label>BMI</label><br>
<input type="number" step="0.1" name="bmi" required><br><br>

<label>Blood Pressure</label><br>
<input type="number" name="bp" required><br><br>

<label>Cholesterol</label><br>
<input type="number" name="cholesterol" required><br><br>

<label>Smoking</label><br>
<select name="smoke">
<option value="" disabled selected>Select an option</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select><br><br>

<label>Diabetes</label><br>
<select name="diabetes">
<option value="" disabled selected>Select an option</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select><br><br>

<label>Physical Activity</label><br>
<select name="activity">
<option value="" disabled selected>Select an option</option><option value="" disabled selected>Select an option</option>
<option value="0">Low</option>
<option value="1">Medium</option>
<option value="2">High</option>
</select><br><br>

<button type="submit">Predict</button>

</form>

<br>

<h3>{{ prediction }}</h3>

<br><br>

<iframe
  src="https://public.tableau.com/views/HeartDiseaseDataAnalysisUsingTableau/AnalyticalDashboardforHeartDiseaseRiskAssessment?:showVizHome=no"
  width="100%"
  height="800"
  frameborder="0">
</iframe>

<iframe
  src="https://public.tableau.com/views/HeartDiseaseRiskAnalysisandComorbidityInsights/HeartDiseaseRiskAnalysisandComorbidityInsights?:showVizHome=no"
  width="100%"
  height="800"
  frameborder="0">
</iframe>

{% endblock %}
