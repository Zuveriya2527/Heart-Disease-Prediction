{% extends "base.html" %}
{% block content %}

<div class="home-container">
    <div class="home-text">
        <h1>Heart Disease Analysis</h1>

        <a href="/dashboard" class="btn">Get Started</a>

             class="heart-image">
    </div>
</div>

{% endblock %}
